data:
  train_split: 0.7 # Proportion of data used for training
  test_size: 0.3 # Proportion of data used for testing
  random_seed: 42 # Ensures reproducibility of dataset splitting

model:
  epochs: 50 # Number of training epochs for deep learning models
  batch_size: 32 # Number of samples per gradient update
  learning_rate: 0.001 # Learning rate for optimisers

  mlp:
    hidden_layer_sizes: [100, 50] # Neurons per hidden layer
    max_iter: 500 # Maximum training iterations

  random_forest:
    n_estimators: 100 # Number of decision trees
    max_depth: null # No depth restriction (fully grown trees)
    min_samples_split: 2 # Minimum samples required to split a node
    min_samples_leaf: 1 # Minimum samples required to split a node

  lstm:
    sequence_length: 24 # Input sequence length for LSTM model
    units_1: 64 # Number of units in first LSTM layer
    units_2: 32 # Number of units in second LSTM layer
    dense_units: 16 # Fully connected layer size
    dropout_1: 0.3 # Dropout rate for first LSTM layer
    dropout_2: 0.3 # Dropout rate for first LSTM layer

callbacks:
  early_stopping_patience: 10 # Stops training if validation loss does not improve
  reduce_lr_patience: 5 # Reduces learning rate after plateau in validation loss
  reduce_lr_factor: 0.5 # Factor by which learning rate is reduced
  reduce_lr_min_lr: 0.000001 # Minimum learning rate allowed

monitor:
  ks_p_threshold: 0.05 # Threshold for KS-test to detect distribution drift
  rmse_drift_factor: 1.10 # Allowed RMSE increase factor before flagging degradation