data:
  train_split: 0.7
  test_size: 0.3
  random_seed: 42
  sequence_length: 10

model:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001

  mlp:
    hidden_layer_sizes: [100, 50]
    max_iter: 500

  random_forest:
    n_estimators: 100
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1

  lstm:
    sequence_length: 24
    units_1: 64
    units_2: 32
    dense_units: 16
    dropout_1: 0.3
    dropout_2: 0.3

# Will utilise callbacks if time permits
callbacks:
  early_stopping_patience: 10
  reduce_lr_patience: 5
  reduce_lr_factor: 0.5
  reduce_lr_min_lr: 0.000001

# Will utilise CV if time permits
evaluate:
  cv_folds: 5

monitor:
  ks_p_threshold: 0.05
  rmse_drift_factor: 1.10