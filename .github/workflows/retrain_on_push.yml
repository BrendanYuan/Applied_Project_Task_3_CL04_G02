name: MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of LSTM training epochs'
        required: false
        default: '50'

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      # ── Python setup ──────────────────────────────────────────
      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      # ── Cache pip dependencies ─────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Configure DVC remote (DagsHub) ────────────────────────
      - name: Configure DVC remote (DagsHub)
        run: |
          dvc remote modify origin auth basic
          dvc remote modify origin user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin password ${{ secrets.DAGSHUB_TOKEN }}

      # ── Pull data from DVC remote ──────────────────────────────
      - name: Pull data
        run: dvc pull --allow-missing --force || echo "No remote data yet — will generate from scratch"

      # ── Override params from workflow_dispatch input ─────────────────
      - name: Override epochs if provided
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - <<'EOF'
          import yaml
          with open("params.yaml") as f:
              p = yaml.safe_load(f)
          p["model"]["epochs"] = int("${{ github.event.inputs.epochs }}")
          with open("params.yaml", "w") as f:
              yaml.dump(p, f)
          print(f"Epochs set to {p['model']['epochs']}")
          EOF

      # ── Reproduce DVC pipeline ─────────────────────────────────
      # dvc repro only re-runs stages whose deps/params changed
      - name: Run DVC pipeline
        run: dvc repro

      # ── Now push the newly created outputs ──────────────────────────
      - name: Push artifacts to DVC remote
        run: dvc push

      # ── Show and compare metrics ───────────────────────────────
      - name: Show metrics
        run: |
          dvc metrics show
          dvc metrics diff HEAD~1 || echo "No previous run to compare against"

      # ── Commit dvc.lock and metrics ────────────────────────────
      - name: Commit dvc.lock and metrics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
          git add dvc.lock metrics.json
          git diff --staged --quiet || git commit -m "update dvc.lock and metrics [skip ci]"
          git push

      # ── Upload artifacts for download from Actions UI ──────────────────────────────────
      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            models/mlp_model.pkl
            models/rf_model.pkl
            models/lstm_model.keras
          retention-days: 30

      # ── Upload artifacts for download from Actions UI ─────────────────────────────────────────
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            artifacts/metrics/model_scores.json
            artifacts/metrics/best_model.json
            reports/monitoring_report.json
            artifacts/models/rf_model.pkl
            artifacts/models/mlp_model.pkl
            artifacts/models/lstm_model.keras
          retention-days: 30

      # ── Post metrics as PR comment ─────────────────────────────
      - name: Post PR comment with metrics diff
        if: github.event_name == 'pull_request'
        run: |
          METRICS=$(dvc metrics diff --md || echo "No metrics diff available")
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Metrics Comparison
            ${METRICS}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
